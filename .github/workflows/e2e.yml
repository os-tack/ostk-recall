name: e2e

# Opt-in end-to-end workflow. Runs the full test matrix with
# OSTK_RECALL_E2E=1 so the network-enabled tests (model download,
# LanceDB with real vectors, etc.) execute. Trigger manually before
# releases.

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  OSTK_RECALL_E2E: "1"

jobs:
  e2e:
    name: e2e / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test (with model download)
        run: cargo test --workspace
