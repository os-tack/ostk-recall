# ostk-recall configuration.
# Location: ${XDG_CONFIG_HOME:-~/.config}/ostk-recall/config.toml
#
# Every field below is validated at load time (unknown keys error).
# See `ostk-recall --help` for CLI.

[corpus]
# Where the LanceDB corpus, SQLite ingest manifest, and audit event log
# live. The path is shell-expanded (`~` → home, `$VAR` → env). The serve
# daemon also binds `<root>/recall.sock` for scan-trigger pokes from the
# watcher (see [watch] below).
root = "~/.local/share/ostk-recall"

[embedder]
# model2vec-rs model name. potion-retrieval-32M (default, 512-dim) has better
# recall than potion-base-8M (256-dim) but takes a fixed extra few ms per batch.
# Switching models requires `ostk-recall init --force` + full re-scan.
model = "potion-retrieval-32M"

# Cross-encoder reranker. After hybrid (dense + BM25 + RRF) returns a
# top-N candidate pool, the reranker scores each (query, doc) pair jointly
# and re-orders. Adds ~150 ms per query (CPU) and ~80 MB to the model cache.
# Omit this block entirely to keep the default (enabled, JINA Turbo English).
[reranker]
enabled = true                              # set false to skip the rerank pass
model = "jina-reranker-v1-turbo-en"         # fastembed v5 RerankerModel id;
                                            # also accepts: jina-reranker-v2-base-multilingual,
                                            # bge-reranker-base, bge-reranker-v2-m3.
                                            # Legacy "ms-marco-MiniLM-L-6-v2" maps to JINA
                                            # Turbo English (closest equivalent in v5).

# Runtime resource caps. The substrate is meant to run in the background
# while a human or agent uses the same machine, so the default is
# intentionally low. Omit the block to accept the default.
#
# Precedence: OSTK_RECALL_WORKERS env var > [runtime].worker_threads >
# default (4). The same value pins the tokio runtime, DataFusion query
# parallelism, and rayon compute pool — no need to tune them independently.
#
# [runtime]
# worker_threads = 4    # raise toward num_cpus() for one-shot CLI runs

# ──────────────────────────────────────────────────────────────────────
# Optional ambient memory lens. When `ostk-recall serve` runs with an
# attention substrate online, a background loop maintains the
# `ostk://memory-lens` MCP resource: a small, query-less portfolio of
# corpus excerpts aligned to whatever the current attention/scope vector
# is focused on. Subscribing clients get proactive context without asking
# for it. Omit the block to accept the defaults shown; set
# `OSTK_RECALL_LENS_DISABLED=1` to turn the loop off for a session, or
# inspect/disable at runtime with `ostk-recall lens show` / `lens disable`.
#
# [lens]
# token_budget = 4000          # hard cap on the rendered lens; excerpts truncate to fit
# min_excerpt_tokens = 200     # floor — drop a slot rather than truncate below this
# drift_threshold = 0.15       # cosine *distance* that triggers a refresh (~0.987 similarity)
# poll_interval_secs = 5       # how often the background loop wakes
# candidate_k_per_lane = 32    # per-lane candidate cap (dense lane today)
# dominance_threshold = 0.30   # min share of total score a feature needs to own a slot
# exclude_facets = [           # key:value facets that bar a chunk from the lens
#     "status:archived",       #   (privacy / status denylist)
# ]

# One [[sources]] table per logical corpus slice.
# `project` is a free-text tag — namespace your corpora however you like.

[[sources]]
kind = "markdown"
project = "notes"
paths = ["~/notes", "~/Documents/research"]

[[sources]]
kind = "claude_code"
project = "claude-code-history"
paths = ["~/.claude/projects"]      # scanner walks every <slug>/*.jsonl

[[sources]]
kind = "gemini"
project = "gemini-cli-history"
paths = ["~/.gemini/tmp"]           # walks every <hash>/chats/session-*.json

[[sources]]
kind = "ostk_project"
project = "ostk"
paths = ["~/projects/ostk"]         # composite — expands to decisions,
                                    # needles, audit, conversations,
                                    # sessions, memory, specs, code
                                    # under .ostk/

[[sources]]
kind = "thread"
project = "ostk-threads"
paths = ["~/projects/ostk/.ostk/threads"]   # one chunk per *.md directly
                                            # under the configured root;
                                            # tension state lifted into
                                            # chunk metadata.

[[sources]]
kind = "code"
project = "experiments"
paths = ["~/experiments"]
extensions = ["rs", "py", "ts"]
# Patterns merged on top of standard .gitignore / .ignore /
# .ostk-recall-ignore handling. Globs are anchored at each path root.
# Underlying engine is the `ignore` crate (same as ripgrep), so anything
# you'd write in a .gitignore works here.
ignore = [
    ".venv/**",        # cover venvs not always in .gitignore
    "vendor/**",
    "**/__pycache__/**",
]
# Optional per-source facets: key → values, stamped onto every chunk this
# source emits. Used for filtered recall and for the lens `exclude_facets`
# denylist above. Single-value keys replace; multi-value keys accumulate.
facets = { tier = ["reference"], lang = ["rust"] }

[[sources]]
kind = "file_glob"
project = "research-pdfs"
paths = ["~/Documents/papers/**/*.txt"]

[[sources]]
kind = "zip_export"
project = "claude-ai-exports"
paths = ["~/Downloads/claude-data-export-*.zip"]

# ──────────────────────────────────────────────────────────────────────
# Optional file-watcher. Pokes the running `ostk-recall serve` daemon's
# scan-trigger socket whenever a debounced batch of FS events lands
# under any watched source path. Run with `ostk-recall watch` in a
# separate process from `ostk-recall serve` (the writer-side daemon
# that binds <corpus.root>/recall.sock).
#
# When omitted, the watcher is disabled and `ostk-recall watch` exits
# at startup with a clear message.
#
# Recommended-source guidance (updated for the v0.6 TurnEnd gate):
#
#   INCLUDE conversation transcripts — `claude_code` and `gemini`. As of
#   v0.6 these are the *only* sources that drive live cognition: a watched
#   transcript append is a "TurnEnd" that wakes the turn observer
#   (familiarity, membrane), the auto-weaver (evidence links), and the
#   ambient memory lens. This is safe now — appends dedup to only-new
#   turns, commits are batched, and non-transcript sources never trigger
#   cognition regardless of how they arrive. (Pre-v0.6 advice was the
#   opposite — back then every ingest looked like a live turn, so watching
#   transcripts flooded the corpus. The gate fixed that.)
#
#   INCLUDE codebases / notes / plans — saves there are intent to
#   re-index. They get ingested and become searchable, but, not being
#   transcripts, they do NOT trigger cognition.
#
#   EXCLUDE self-writing non-transcript sources like `ostk_project`
#   (`.ostk/journal.jsonl`, epoch seals) — watching them just causes
#   constant re-index churn with no cognition benefit.
#
# [watch]
# enabled = true
#
# # `mode` (v0.1.7+) gates the per-path scan path:
# #   "legacy"      (default) — every kick runs a full scan(...). Safe
# #                 fallback that always picks up every source. Use
# #                 while the path-aware path bakes.
# #   "incremental" — kick passes the changed paths to scan_paths(...);
# #                 ~250 ms save → corpus on Linux/Windows, slightly
# #                 longer on macOS due to FSEvents floor. Per-path
# #                 ingest. Empty body still falls back to legacy
# #                 scan-all on either side, so old↔new versions
# #                 across the wire degrade gracefully.
# #
# # Recommended for the live-cognition flow: "incremental". It keeps the
# # save→corpus latency low enough that watched transcript TurnEnds feel
# # live. ("legacy" is still the built-in default pending field bake-in.)
# mode = "incremental"
#
# # Debounce window (ms). When omitted, defaults are per-platform —
# # Linux 800 (inotify is precise; saves are the burst), macOS 1500
# # (FSEvents adds a ~30 ms floor), Windows 1200 (ReadDirChangesW +
# # IOCP batching + AV filter latency). Override only if your editor's
# # save pattern doesn't behave well at the default.
# # debounce_ms = 1500
#
# # Optional `[[sources]].project` allowlist. When empty/omitted, watches
# # every source. When set, ONLY sources whose `project` tag matches drive
# # the watcher — useful for skipping the noisy auto-writers above.
# projects = [
#     "claude-code-history",  # ← watch these: transcript appends are the
#     "gemini-cli-history",   #   TurnEnds that drive live cognition (v0.6+)
#     "notes",
#     "experiments",
#     "claude-plans",         # if you index ~/.claude/plans, watch it
#     # NOT "ostk"            — .ostk/ self-writes on every verb (churn, no
#     #                         cognition benefit — it isn't a transcript)
# ]
#
# # Override the trigger socket path. Defaults to <corpus.root>/recall.sock
# # which is the same path `serve` binds. Rare to need this — set only if
# # you're running multiple corpora or non-default deployments.
# # socket = "~/.local/share/ostk-recall/recall.sock"
